name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      zip_name: ${{ steps.build.outputs.ZIP_NAME }}
      firefox_xpi_name: ${{ steps.firefox.outputs.XPI_NAME }}
      firefox_source_name: ${{ steps.firefox-source.outputs.SOURCE_NAME }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Verify manifest version matches tag
        run: |
          MANIFEST_VERSION=$(grep -oP "version:\s*'(\K[^']+)" src/manifest.ts)
          TAG_VERSION=${{ steps.version.outputs.VERSION }}
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::src/manifest.ts version ($MANIFEST_VERSION) does not match tag (v$TAG_VERSION)"
            exit 1
          fi

      - name: Lint
        run: yarn lint

      - name: Type check
        run: yarn type-check

      - name: Test
        run: yarn test:coverage

      - name: Build extension
        run: yarn build

      - name: Build ZIP
        id: build
        run: |
          ZIP_NAME="zhihu-analysis-v${{ steps.version.outputs.VERSION }}.zip"
          cd dist
          zip -r "../$ZIP_NAME" . -x "*.DS_Store"
          cd ..
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: extension-zip
          path: ${{ steps.build.outputs.ZIP_NAME }}

      - name: Build Firefox extension
        run: yarn build:firefox

      - name: Lint Firefox package
        run: yarn lint:firefox

      - name: Package Firefox xpi
        id: firefox
        run: |
          yarn package:firefox
          XPI_NAME="zhihu-analysis-firefox-v${{ steps.version.outputs.VERSION }}.xpi"
          SRC_ZIP=$(ls web-ext-artifacts/*.zip 2>/dev/null | head -1)
          if [ -z "$SRC_ZIP" ]; then
            echo "::error::web-ext build produced no artifacts in web-ext-artifacts/"
            exit 1
          fi
          mv "$SRC_ZIP" "$XPI_NAME"
          echo "XPI_NAME=$XPI_NAME" >> "$GITHUB_OUTPUT"

      - name: Build Firefox source archive
        id: firefox-source
        run: |
          SOURCE_NAME="zhihu-analysis-firefox-source-v${{ steps.version.outputs.VERSION }}.zip"
          zip -r "$SOURCE_NAME" \
            src \
            scripts \
            package.json \
            yarn.lock \
            tsconfig.json \
            vite.config.ts \
            docs/firefox-release.md \
            -x "*.DS_Store" "src/**/*.test.ts" "src/**/*.test.tsx" || true
          if [ ! -f "$SOURCE_NAME" ]; then
            echo "::error::Source archive was not created"
            exit 1
          fi
          echo "SOURCE_NAME=$SOURCE_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload Firefox artifact
        uses: actions/upload-artifact@v5
        with:
          name: firefox-xpi
          path: |
            ${{ steps.firefox.outputs.XPI_NAME }}
            ${{ steps.firefox-source.outputs.SOURCE_NAME }}

  github-release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Chrome artifact
        uses: actions/download-artifact@v5
        with:
          name: extension-zip

      - name: Download Firefox artifact
        uses: actions/download-artifact@v5
        with:
          name: firefox-xpi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.build.outputs.version }}
          body: |
            ## 安装方法

            ### Chrome
            1. 下载下方的 `${{ needs.build.outputs.zip_name }}` 文件
            2. 解压到一个固定位置
            3. 打开 Chrome，访问 `chrome://extensions/`
            4. 右上角开启「开发者模式」
            5. 点击「加载已解压的扩展程序」，选择解压后的文件夹

            ### Edge
            1. 下载下方的 `${{ needs.build.outputs.zip_name }}` 文件
            2. 解压到一个固定位置
            3. 打开 Edge，访问 `edge://extensions/`
            4. 左下角开启「开发人员模式」
            5. 点击「加载解压缩的扩展」，选择解压后的文件夹

            ### Firefox
            正式版请在 Firefox Add-ons 商店搜索 “知析” 安装。
            如需手动安装 `${{ needs.build.outputs.firefox_xpi_name }}`，请使用 Firefox Developer Edition / Nightly 并在 `about:config` 中将 `xpinstall.signatures.required` 设为 `false` 后拖拽安装（正式版 Firefox 仅接受 AMO 签名的扩展）。

            打开知析 Dashboard 即可查看收益分析数据。
          files: |
            ${{ needs.build.outputs.zip_name }}
            ${{ needs.build.outputs.firefox_xpi_name }}

  # ==========================================
  # Chrome Web Store 自动发布（Service Account + Chrome Web Store API V2）
  # ==========================================
  # 需要在仓库 Settings → Secrets 中配置：
  #   CHROME_EXTENSION_ID          — 扩展 ID
  #   CHROME_PUBLISHER_ID          — 发布者 ID（从开发者控制台获取）
  #   CHROME_SERVICE_ACCOUNT_JSON  — Service Account JSON 密钥（整个文件内容）
  publish-chrome:
    needs: build
    if: vars.CHROME_STORE_ENABLED == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v5
        with:
          name: extension-zip

      - name: Publish to Chrome Web Store
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_PUBLISHER_ID: ${{ secrets.CHROME_PUBLISHER_ID }}
          CHROME_SERVICE_ACCOUNT_JSON: ${{ secrets.CHROME_SERVICE_ACCOUNT_JSON }}
        run: |
          set -e

          # 1. 从 Service Account JSON 中提取信息并构造 JWT
          echo "::group::Fetching access token via Service Account"
          SA_EMAIL=$(echo "$CHROME_SERVICE_ACCOUNT_JSON" | jq -r '.client_email')
          SA_KEY=$(echo "$CHROME_SERVICE_ACCOUNT_JSON" | jq -r '.private_key')

          NOW=$(date +%s)
          EXP=$((NOW + 3600))
          SCOPE="https://www.googleapis.com/auth/chromewebstore"
          TOKEN_URI="https://oauth2.googleapis.com/token"

          b64url() {
            openssl base64 -A | tr '+/' '-_' | tr -d '='
          }

          JWT_HEADER=$(printf '{"alg":"RS256","typ":"JWT"}' | b64url)
          JWT_PAYLOAD=$(printf '{"iss":"%s","scope":"%s","aud":"%s","iat":%d,"exp":%d}' \
            "$SA_EMAIL" "$SCOPE" "$TOKEN_URI" "$NOW" "$EXP" | b64url)

          JWT_SIGNATURE=$(printf '%s.%s' "$JWT_HEADER" "$JWT_PAYLOAD" | \
            openssl dgst -sha256 -sign <(echo "$SA_KEY") | b64url)

          JWT="${JWT_HEADER}.${JWT_PAYLOAD}.${JWT_SIGNATURE}"

          TOKEN_RESPONSE=$(curl -s -f "$TOKEN_URI" \
            -d "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer" \
            -d "assertion=${JWT}")
          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')
          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "::error::Failed to obtain access token"
            echo "$TOKEN_RESPONSE"
            exit 1
          fi
          echo "Access token obtained successfully"
          echo "::endgroup::"

          # 2. 上传扩展包
          echo "::group::Uploading extension"
          UPLOAD_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -X POST \
            -T "${{ needs.build.outputs.zip_name }}" \
            "https://chromewebstore.googleapis.com/upload/v2/publishers/${CHROME_PUBLISHER_ID}/items/${CHROME_EXTENSION_ID}:upload")
          UPLOAD_HTTP_CODE=$(echo "$UPLOAD_RESPONSE" | tail -1)
          UPLOAD_BODY=$(echo "$UPLOAD_RESPONSE" | sed '$d')
          echo "Upload response (HTTP ${UPLOAD_HTTP_CODE}):"
          echo "$UPLOAD_BODY" | jq . 2>/dev/null || echo "$UPLOAD_BODY"
          if [ "$UPLOAD_HTTP_CODE" -lt 200 ] || [ "$UPLOAD_HTTP_CODE" -ge 300 ]; then
            echo "::error::Upload failed with HTTP ${UPLOAD_HTTP_CODE}"
            exit 1
          fi
          echo "::endgroup::"

          # 3. 提交发布
          echo "::group::Publishing extension"
          PUBLISH_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -X POST \
            "https://chromewebstore.googleapis.com/v2/publishers/${CHROME_PUBLISHER_ID}/items/${CHROME_EXTENSION_ID}:publish")
          PUBLISH_HTTP_CODE=$(echo "$PUBLISH_RESPONSE" | tail -1)
          PUBLISH_BODY=$(echo "$PUBLISH_RESPONSE" | sed '$d')
          echo "Publish response (HTTP ${PUBLISH_HTTP_CODE}):"
          echo "$PUBLISH_BODY" | jq . 2>/dev/null || echo "$PUBLISH_BODY"
          if [ "$PUBLISH_HTTP_CODE" -lt 200 ] || [ "$PUBLISH_HTTP_CODE" -ge 300 ]; then
            echo "::error::Publish failed with HTTP ${PUBLISH_HTTP_CODE}"
            exit 1
          fi
          echo "Extension published successfully!"
          echo "::endgroup::"

  # ==========================================
  # Edge Add-ons 自动发布
  # ==========================================
  # 需要在仓库 Settings → Secrets 中配置：
  #   EDGE_PRODUCT_ID  — 产品 ID（从 Partner Center 获取）
  #   EDGE_CLIENT_ID   — API 客户端 ID
  #   EDGE_API_KEY     — API 密钥（client secret）
  publish-edge:
    needs: build
    if: vars.EDGE_STORE_ENABLED == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v5
        with:
          name: extension-zip

      - name: Publish to Edge Add-ons
        uses: wdzeng/edge-addon@v2
        with:
          product-id: ${{ secrets.EDGE_PRODUCT_ID }}
          zip-path: ${{ needs.build.outputs.zip_name }}
          client-id: ${{ secrets.EDGE_CLIENT_ID }}
          api-key: ${{ secrets.EDGE_API_KEY }}

  # ==========================================
  # Firefox Add-ons (AMO) 自动发布
  # ==========================================
  # 需要在仓库 Settings → Secrets 中配置：
  #   AMO_JWT_ISSUER  — addons.mozilla.org API key issuer
  #   AMO_JWT_SECRET  — addons.mozilla.org API key secret
  # 并在 Variables 中将 FIREFOX_STORE_ENABLED 设为 'true'
  publish-firefox:
    needs: build
    if: vars.FIREFOX_STORE_ENABLED == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download Firefox artifact
        uses: actions/download-artifact@v5
        with:
          name: firefox-xpi

      - name: Publish to Firefox Add-ons
        uses: wdzeng/firefox-addon@v1
        with:
          addon-guid: zhixi@chouheiwa.dev
          xpi-path: ${{ needs.build.outputs.firefox_xpi_name }}
          source-file-path: ${{ needs.build.outputs.firefox_source_name }}
          jwt-issuer: ${{ secrets.AMO_JWT_ISSUER }}
          jwt-secret: ${{ secrets.AMO_JWT_SECRET }}
          approval-notes: |
            Build environment: Node 20 (ubuntu-latest)
            Build commands:
              yarn install --frozen-lockfile
              yarn build:firefox
            Output: dist-firefox/ — matches the uploaded xpi byte-for-byte.
            Reproducibility info is in dist-firefox/.build-info.json
            See docs/firefox-release.md in the source archive for full details.
          release-notes: |
            {"zh-CN": "版本 ${{ needs.build.outputs.version }} — 详见 GitHub Release"}
