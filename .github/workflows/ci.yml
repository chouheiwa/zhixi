name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt into Node 24 for JavaScript actions ahead of the June 2026 forced switch.
# actions/upload-artifact@v5 (and a few others) still ship Node 20 binaries.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Type check
        run: yarn type-check

      - name: Test with coverage
        run: yarn test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: coverage-report
          path: coverage/

      - name: Build
        run: yarn build
